<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="brand">
      <h2>CLINICAL SANCTUARY</h2>
      <span class="version">Dental Suite v1.0</span>
    </div>
    <nav class="nav-menu">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <span class="icon">⊞</span> TABLERO
      </a>
      <!-- Placeholder route for Agenda -->
      <a routerLink="/agenda" routerLinkActive="active" class="nav-item">
        <span class="icon">📅</span> AGENDA
      </a>
      <a routerLink="/pacientes" routerLinkActive="active" class="nav-item" [routerLinkActiveOptions]="{exact: false}">
        <span class="icon">👥</span> PACIENTES
      </a>
      <a routerLink="/finanzas" routerLinkActive="active" class="nav-item">
        <span class="icon">💰</span> FINANZAS
      </a>
      <div class="nav-item-dropdown" (mouseenter)="showDirectorio = true" (mouseleave)="showDirectorio = false">
        <div class="nav-item">
          <span class="icon">📁</span> DIRECTORIO
        </div>
        <div class="dropdown-menu" *ngIf="showDirectorio">
          <a routerLink="/directorio/colegas" routerLinkActive="active" class="dropdown-item">Colegas</a>
          <a routerLink="/directorio/laboratorios" routerLinkActive="active" class="dropdown-item">Laboratorios</a>
          <a routerLink="/directorio/proveedores" routerLinkActive="active" class="dropdown-item">Proveedores</a>
        </div>
      </div>
      <a routerLink="/configuracion" routerLinkActive="active" class="nav-item">
        <span class="icon">⚙</span> CONFIGURACIÓN
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" class="nav-item">
        <span class="icon">❓</span> SOPORTE
      </a>
      <button class="logout-btn" (click)="logout()">
        <span class="icon">🚪</span> CERRAR SESIÓN
      </button>
    </div>
  </aside>
  
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
